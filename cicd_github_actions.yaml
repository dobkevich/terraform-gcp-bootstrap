# Ready-to-use GitHub Actions workflow with WIF
name: "Terraform Plan/Apply"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Prevents simultaneous runs of two pipelines, protecting the state
concurrency:
  group: terraform
  cancel-in-progress: false

permissions:
  id-token: write         # Required for WIF
  contents: read          # Required for checkout
  pull-requests: write    # Required for posting PR comments
  security-events: write  # Required for some security scanners

env:
  WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    name: "Terraform Automation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 1. Style & Quality Checks (Fail fast)
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0

      - name: Run TFLint
        run: tflint -f compact

      # 2. Security Scan (Double Defense)
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: true

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

      # 3. Authentication & Setup
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Terraform Init
        run: terraform init -input=false -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      # 4. Plan & PR Commenting
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format ✨ \`Passed\`
            #### TFLint 🔍 \`Passed\`
            #### Security Scan (Checkov & tfsec) 🛡️ \`Passed\`
            #### Terraform Initialization ⚙️
            #### Terraform Validation 🤖
            #### Terraform Plan 📋
            
            <details><summary>Show full Plan log</summary>
            
            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Action: @${{ github.actor }}, Event: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # 5. Apply (Merge to main only)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false -no-color
